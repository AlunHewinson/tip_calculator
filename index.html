<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Splitter</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Tip Splitter</h1>

        <div class="card">
            <h2>Employees</h2>

            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Hours</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button id="addEmployeeButton">
                Add Employee
            </button>
        </div>

        <div class="card">
            <h2>Tips</h2>

            <label for="totalTips">
                Total Tips (£)
            </label>

            <input
                id="totalTips"
                type="number"
                min="0"
                step="0.01">
        </div>

        <div class="card">
            <button id="calculateButton">
                Calculate
            </button>
        </div>

        <div class="card">
            <h2>Results</h2>

            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Share</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
